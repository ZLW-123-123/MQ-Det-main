DATALOADER:
  ASPECT_RATIO_GROUPING: false
  SIZE_DIVISIBILITY: 32
DATASETS:
  GENERAL_COPY: 4
  OVERRIDE_CATEGORY: '[
    {"id": 1, "name": "dent", "supercategory": "none"},
    {"id": 2, "name": "scratch", "supercategory": "none"},
    {"id": 3, "name": "crack", "supercategory": "none"},
    {"id": 4, "name": "glass shatter", "supercategory": "none"},
    {"id": 5, "name": "lamp broken", "supercategory": "none"},
    {"id": 6, "name": "tire flat", "supercategory": "none"}
  ]'
  REGISTER:
    test:
      ann_file: datasets/dataset3/annotations/test.json
      img_dir: datasets/dataset3/test
    train:
      ann_file: datasets/dataset3/annotations/train.json
      img_dir: datasets/dataset3/train
    train_1_3:
      ann_file: datasets/dataset3/annotations/1_shot.json
      img_dir: datasets/dataset3/train
    train_5_3:
      ann_file: datasets/dataset3/annotations/5_shot.json
      img_dir: datasets/dataset3/train
    train_10_3:
      ann_file: datasets/dataset3/annotations/10_shot.json
      img_dir: datasets/dataset3/train
  TEST: ("test",)
  TRAIN: ("train_1_3",)
INPUT:
  MAX_SIZE_TEST: 1333
  MAX_SIZE_TRAIN: 1333
  MIN_SIZE_TEST: 800
  MIN_SIZE_TRAIN: 800
MODEL:
  ATSS:
    NUM_CLASSES: 7
  DYHEAD:
    NUM_CLASSES: 7
  FCOS:
    NUM_CLASSES: 7
  ROI_BOX_HEAD:
    NUM_CLASSES: 7
SOLVER:
  CHECKPOINT_PERIOD: 100
  MAX_EPOCH: 12
  WARMUP_ITERS: 2
TEST:
  IMS_PER_BATCH: 1
VISION_QUERY:
  DATASET_NAME: 'dataset3'
